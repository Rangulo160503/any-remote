<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="format-detection" content="telephone=no"/>
    <title>Any-Remote</title>
    <link rel="stylesheet" href="/client.css"/>
</head>
<body>
    <div id="app">
        <div id="connect-splash" class="connect-splash hidden">
            <div class="splash-card">
                <h1>Any-Remote</h1>
                <p>Tap to start a secure remote session</p>
                <button id="splash-connect" type="button" class="primary splash-btn">Tap to Connect</button>
            </div>
        </div>

        <header class="toolbar" id="desktop-toolbar">
            <div class="toolbar-group">
                <button id="start" class="primary" type="button">Connect</button>
                <button id="stop" class="danger" type="button" style="display:none">Disconnect</button>
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Offline</span>
            </div>
            <div class="toolbar-group">
                <label>Zoom
                    <input type="range" id="zoom-slider" min="50" max="200" step="25" value="100"/>
                    <span id="zoom-label">100%</span>
                </label>
                <button type="button" id="btn-fit" class="active">Fit</button>
                <button type="button" id="btn-actual">1:1</button>
                <button type="button" id="btn-reset-zoom">Reset</button>
            </div>
            <div class="toolbar-group">
                <label>Quality
                    <select id="quality-select">
                        <option value="mobile">Mobile</option>
                        <option value="balanced" selected>Balanced</option>
                        <option value="high">High</option>
                        <option value="ultra">Ultra</option>
                    </select>
                </label>
            </div>
            <div class="toolbar-group toolbar-diag">
                <span class="info-line" id="info-coords">—</span>
                <span class="info-line hide-mobile" id="info-stream">—</span>
                <span class="info-line" id="info-conn">—</span>
            </div>
        </header>

        <div id="hud-panel" class="hud-panel" aria-live="polite"></div>
        <div id="video-watchdog" class="video-watchdog hidden" aria-live="polite">—</div>

        <main class="viewport" id="viewport">
            <div id="desktop-container">
                <div id="video-mount"></div>
                <div id="touch-overlay" class="touch-overlay"></div>
                <div id="virtual-cursor" class="virtual-cursor"></div>
            </div>
        </main>

        <nav id="mobile-toolbar" class="mobile-toolbar hidden collapsed" aria-label="Remote controls">
            <button type="button" id="m-toggle-bar" class="m-fab" title="Toolbar">☰</button>
            <div class="m-bar-inner">
                <button type="button" id="m-reconnect" title="Reconnect">↻</button>
                <button type="button" id="m-stop" class="danger" title="Disconnect">✕</button>
                <button type="button" id="m-keyboard" title="Keyboard">⌨</button>
                <button type="button" id="m-clipboard" title="Paste to remote">📋</button>
                <button type="button" id="m-right-click" title="Right click">☰</button>
                <button type="button" id="btn-touch-mode" class="active" title="Trackpad mode">Trackpad</button>
                <button type="button" id="btn-touch-direct" title="Direct touch">Direct</button>
                <button type="button" id="m-fit" title="Fit screen">Fit</button>
                <button type="button" id="m-zoom" title="Zoom step">＋</button>
                <select id="m-quality" title="Quality">
                    <option value="mobile">Mobile</option>
                    <option value="balanced">Balanced</option>
                    <option value="high">High</option>
                </select>
                <label class="m-sens">Sens
                    <input type="range" id="sensitivity-slider" min="0.6" max="2.5" step="0.1" value="1.35"/>
                </label>
            </div>
        </nav>

        <textarea id="hidden-text" class="hidden-text hidden" rows="1" autocomplete="off" autocorrect="on" autocapitalize="off" enterkeyhint="done" aria-hidden="true"></textarea>
    </div>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
