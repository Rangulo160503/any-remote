<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Any-Remote</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #0f1115;
            color: #e8eaed;
        }
        .page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }
        h1 { font-size: 1.2rem; margin: 0 0 12px; font-weight: 600; }

        .connect-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        button {
            padding: 8px 14px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #3b82f6;
            color: #fff;
            font-size: 13px;
        }
        button:hover { background: #2563eb; }
        button.secondary { background: #334155; }
        button.secondary:hover { background: #475569; }
        #stop { background: #dc2626; }
        #stop:hover { background: #b91c1c; }
        #status {
            font-size: 13px;
            color: #94a3b8;
            margin-left: 4px;
        }

        .viewer-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 20px;
            padding: 10px 14px;
            background: #1a1f28;
            border: 1px solid #2d3748;
            border-radius: 8px 8px 0 0;
        }
        .viewer-toolbar label {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #zoom-slider {
            width: 140px;
            vertical-align: middle;
        }
        #zoom-label {
            min-width: 40px;
            color: #e2e8f0;
            font-variant-numeric: tabular-nums;
        }

        .desktop-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #0a0c10;
            border: 1px solid #2d3748;
            border-radius: 0 0 8px 8px;
            padding: 20px;
            min-height: 420px;
        }

        .viewport {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            max-height: calc(100vh - 200px);
        }

        #video-scaler {
            transition: transform 0.15s ease-out;
            transform-origin: center center;
        }

        #viewer {
            position: relative;
            background: #000;
            border-radius: 4px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #video {
            display: block;
            object-fit: contain;
            cursor: crosshair;
            pointer-events: auto;
            outline: none;
            vertical-align: top;
        }

        #video.fit-mode {
            width: 100%;
            max-width: min(1280px, 100%);
            max-height: 75vh;
            height: auto;
        }

        #video.actual-mode {
            width: auto;
            height: auto;
            max-width: none;
            max-height: none;
        }

        #cursor-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border-radius: 50%;
            background: rgba(255, 80, 80, 0.9);
            border: 2px solid #fff;
            pointer-events: none;
            display: none;
            z-index: 2;
        }
        #coord-debug {
            position: absolute;
            top: 6px;
            left: 6px;
            padding: 4px 8px;
            font-size: 10px;
            font-family: ui-monospace, monospace;
            background: rgba(0, 0, 0, 0.7);
            color: #a5f3fc;
            pointer-events: none;
            z-index: 2;
            line-height: 1.35;
            white-space: pre;
            max-width: 90%;
        }
        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>Remote desktop</h1>

        <div class="connect-bar">
            <button id="start" onclick="start()">Connect</button>
            <button id="stop" style="display:none" onclick="stop()">Disconnect</button>
            <span id="status">Disconnected</span>
        </div>

        <div class="viewer-toolbar">
            <label>
                Zoom
                <input type="range" id="zoom-slider" min="50" max="200" step="25" value="100"/>
                <span id="zoom-label">100%</span>
            </label>
            <button type="button" class="secondary" id="btn-fit" onclick="setDisplayMode('fit')">Fit window</button>
            <button type="button" class="secondary" id="btn-actual" onclick="setDisplayMode('actual')">Actual size</button>
            <button type="button" class="secondary" id="btn-reset-zoom" onclick="resetZoom()">Reset zoom</button>
        </div>

        <div class="desktop-stage">
            <div class="viewport">
                <div id="video-scaler">
                    <div id="viewer">
                        <video id="video" class="fit-mode" autoplay playsinline muted tabindex="0"></video>
                        <div id="cursor-dot"></div>
                        <pre id="coord-debug">—</pre>
                    </div>
                </div>
            </div>
        </div>

        <p class="hint">
            Click the video for keyboard. Coordinates use the visible picture (letterbox ignored).
            Lower latency: host runs at 960×540 @ 12 FPS by default.
        </p>
    </div>

    <script src="client.js"></script>
</body>
</html>
