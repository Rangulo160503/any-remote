<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="format-detection" content="telephone=no"/>
    <title>Any-Remote</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0c0e12;
            color: #e8eaed;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            width: 100%;
        }

        .toolbar {
            flex: 0 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px 10px;
            padding: 8px 10px;
            background: #161b22;
            border-bottom: 1px solid #2d333b;
            z-index: 10;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .toolbar-group + .toolbar-group {
            padding-left: 10px;
            border-left: 1px solid #30363d;
        }

        .toolbar label {
            font-size: 11px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        button, select {
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #e6edf3;
            padding: 8px 10px;
            cursor: pointer;
            touch-action: manipulation;
        }
        button.primary { background: #238636; border-color: #238636; }
        button.danger { background: #da3633; border-color: #da3633; }
        button.active { outline: 2px solid #388bfd; }

        #zoom-slider { width: 72px; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6e7681;
        }
        .status-dot.live { background: #3fb950; }
        #status-text { font-size: 12px; color: #8b949e; }

        .info-line {
            font-size: 10px;
            font-family: ui-monospace, monospace;
            color: #6e7681;
        }

        .viewport {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
            background: #080a0d;
        }

        #desktop-container {
            flex: 0 0 auto;
            background: #000;
            border-radius: 4px;
            line-height: 0;
        }

        #desktop-container, #video {
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
        }

        body.remote-drag { user-select: none; }

        #video {
            display: block;
            object-fit: fill;
            cursor: crosshair;
            pointer-events: auto;
            outline: none;
            background: #000;
        }

        /* Mobile layout */
        body.is-mobile .toolbar-group + .toolbar-group {
            border-left: none;
            padding-left: 0;
        }
        body.is-mobile .toolbar {
            padding: 6px 8px;
        }
        body.is-mobile .info-line.hide-mobile {
            display: none;
        }
        body.is-mobile #btn-actual,
        body.is-mobile #btn-reset-zoom {
            display: none;
        }
        body.is-mobile .viewport {
            padding: 4px;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="toolbar">
            <div class="toolbar-group">
                <button id="start" class="primary" type="button">Connect</button>
                <button id="stop" class="danger" type="button" style="display:none">Disconnect</button>
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Offline</span>
            </div>

            <div class="toolbar-group">
                <label>Zoom
                    <input type="range" id="zoom-slider" min="50" max="200" step="25" value="100"/>
                    <span id="zoom-label">100%</span>
                </label>
                <button type="button" id="btn-fit" class="active">Fit</button>
                <button type="button" id="btn-actual">1:1</button>
                <button type="button" id="btn-reset-zoom">Reset</button>
            </div>

            <div class="toolbar-group">
                <label>Quality
                    <select id="quality-select">
                        <option value="mobile">Mobile</option>
                        <option value="low">Low</option>
                        <option value="balanced" selected>Balanced</option>
                        <option value="high">High</option>
                    </select>
                </label>
            </div>

            <div class="toolbar-group">
                <span class="info-line" id="info-coords">—</span>
                <span class="info-line hide-mobile" id="info-stream">—</span>
                <span class="info-line" id="info-stats">—</span>
            </div>
        </header>

        <main class="viewport" id="viewport">
            <div id="desktop-container">
                <video
                    id="video"
                    autoplay
                    playsinline
                    webkit-playsinline
                    muted
                    disablePictureInPicture
                    tabindex="0"
                ></video>
            </div>
        </main>
    </div>

    <script src="client.js"></script>
</body>
</html>
