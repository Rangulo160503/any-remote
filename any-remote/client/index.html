<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Any-Remote</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 16px;
            background: #1a1a1a;
            color: #eee;
        }
        h1 { font-size: 1.25rem; margin: 0 0 12px; }
        .toolbar { margin-bottom: 12px; }
        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #3b82f6;
            color: #fff;
            font-size: 14px;
        }
        button:hover { background: #2563eb; }
        #stop { background: #dc2626; }
        #status {
            display: inline-block;
            margin-left: 12px;
            font-size: 13px;
            color: #94a3b8;
        }
        #viewer {
            position: relative;
            display: inline-block;
            max-width: 1280px;
            width: 100%;
            border: 1px solid #334155;
            border-radius: 6px;
            overflow: hidden;
            background: #000;
        }
        #video {
            display: block;
            width: 100%;
            max-height: 720px;
            object-fit: contain;
            cursor: crosshair;
            pointer-events: auto;
            outline: none;
        }
        #cursor-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            border-radius: 50%;
            background: rgba(255, 80, 80, 0.9);
            border: 2px solid #fff;
            pointer-events: none;
            display: none;
            z-index: 2;
        }
        #coord-debug {
            position: absolute;
            top: 6px;
            left: 6px;
            padding: 4px 8px;
            font-size: 11px;
            font-family: ui-monospace, monospace;
            background: rgba(0, 0, 0, 0.75);
            color: #a5f3fc;
            pointer-events: none;
            z-index: 2;
            line-height: 1.4;
            white-space: pre;
        }
        .hint {
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <h1>Remote desktop</h1>
    <div class="toolbar">
        <button id="start" onclick="start()">Connect</button>
        <button id="stop" style="display:none" onclick="stop()">Disconnect</button>
        <span id="status">Disconnected</span>
    </div>

    <div id="viewer">
        <video id="video" autoplay playsinline muted tabindex="0"></video>
        <div id="cursor-dot"></div>
        <pre id="coord-debug">—</pre>
    </div>

    <p class="hint">
        Click the video to capture keyboard. Right-click on the video for remote context menu.
        Coordinates map to the visible picture only (letterbox bars are ignored).
    </p>

    <script src="client.js"></script>
</body>
</html>
