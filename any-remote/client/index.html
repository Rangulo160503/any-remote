<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Any-Remote</title>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #0c0e12;
            color: #e8eaed;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        .toolbar {
            flex: 0 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px 14px;
            padding: 8px 14px;
            background: linear-gradient(180deg, #161b22 0%, #12161c 100%);
            border-bottom: 1px solid #2d333b;
            z-index: 10;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-group + .toolbar-group {
            padding-left: 14px;
            border-left: 1px solid #30363d;
        }

        .toolbar label {
            font-size: 11px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button, select {
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid #30363d;
            background: #21262d;
            color: #e6edf3;
            padding: 6px 10px;
            cursor: pointer;
        }
        button:hover, select:hover { background: #30363d; }
        button.primary { background: #238636; border-color: #238636; }
        button.primary:hover { background: #2ea043; }
        button.danger { background: #da3633; border-color: #da3633; }
        button.danger:hover { background: #f85149; }
        button.active { outline: 2px solid #388bfd; }

        #zoom-slider { width: 100px; vertical-align: middle; }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6e7681;
            display: inline-block;
        }
        .status-dot.live { background: #3fb950; }
        #status-text { font-size: 12px; color: #8b949e; min-width: 80px; }

        .info-line {
            font-size: 11px;
            font-family: ui-monospace, monospace;
            color: #6e7681;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .viewport {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            background: #080a0d;
        }

        #desktop-container {
            flex: 0 0 auto;
            background: #000;
            border-radius: 4px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
            line-height: 0;
            transition: width 0.12s ease-out, height 0.12s ease-out;
        }

        #desktop-container,
        #video {
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
        }

        body.remote-drag {
            user-select: none;
            cursor: crosshair;
        }

        #video {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            cursor: crosshair;
            pointer-events: auto;
            outline: none;
            image-rendering: auto;
        }

        #video.crisp {
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>
<body>
    <div id="app">
        <header class="toolbar">
            <div class="toolbar-group">
                <button id="start" class="primary" type="button">Connect</button>
                <button id="stop" class="danger" type="button" style="display:none">Disconnect</button>
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Offline</span>
            </div>

            <div class="toolbar-group">
                <label>Zoom
                    <input type="range" id="zoom-slider" min="50" max="200" step="25" value="100"/>
                    <span id="zoom-label">100%</span>
                </label>
                <button type="button" id="btn-fit" class="active">Fit</button>
                <button type="button" id="btn-actual">1:1</button>
                <button type="button" id="btn-reset-zoom">Reset</button>
            </div>

            <div class="toolbar-group">
                <label>Quality
                    <select id="quality-select">
                        <option value="low">Low</option>
                        <option value="balanced" selected>Balanced</option>
                        <option value="high">High</option>
                    </select>
                </label>
            </div>

            <div class="toolbar-group" style="margin-left:auto">
                <span class="info-line" id="info-coords">coords —</span>
                <span class="info-line" id="info-stream">stream —</span>
                <span class="info-line" id="info-stats">fps —</span>
            </div>
        </header>

        <main class="viewport" id="viewport">
            <div id="desktop-container">
                <video id="video" class="crisp" autoplay playsinline muted tabindex="0"></video>
            </div>
        </main>
    </div>

    <script src="client.js"></script>
</body>
</html>
